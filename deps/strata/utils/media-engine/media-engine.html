<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Media Engine demo</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; background: #111; color: #eee; font: 14px/1.45 system-ui, sans-serif; }
  body { padding: 24px; }
  a { color: #ddd; }
  h1 { margin: 0 0 8px; font-size: 24px; }
  p { margin: 0 0 20px; color: #bbb; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; max-width: 960px; }
  .tile { border: 1px solid #333; background: #1b1b1b; color: #eee; padding: 0; text-align: left; cursor: pointer; }
  .tile img, .tile .placeholder { display: block; width: 100%; aspect-ratio: 3 / 2; object-fit: cover; background: #222; }
  .tile strong { display: block; padding: 10px 10px 2px; }
  .tile span { display: block; padding: 0 10px 10px; color: #999; font-size: 12px; }

  #viewer { display: none; position: fixed; inset: 0; z-index: 10; background: rgba(0,0,0,.94); color: #eee; }
  #viewer.open { display: block; }
  #stage { position: absolute; inset: 62px 16px 118px; overflow: hidden; border: 1px solid #333; background: #080808; }
  #stage img { position: absolute; top: 0; left: 0; touch-action: none; user-select: none; }
  #stage video { width: 100%; height: 100%; object-fit: contain; background: #000; }
  #stage audio { width: min(640px, calc(100% - 32px)); margin: 40px 16px; }
  .bar { position: absolute; left: 16px; right: 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .top { top: 14px; }
  .bottom { bottom: 14px; }
  button, input, select { font: inherit; }
  button { border: 1px solid #444; background: #222; color: #eee; padding: 6px 9px; cursor: pointer; }
  button:hover { background: #2e2e2e; }
  button:disabled { opacity: .35; cursor: default; }
  input[type="range"] { accent-color: #eee; }
  .spacer { flex: 1; }
  .muted { color: #aaa; }
  .hidden { display: none !important; }
  #status { position: absolute; inset: 62px 16px 118px; display: grid; place-items: center; pointer-events: none; color: #ddd; text-align: center; padding: 20px; }
  #captions { position: absolute; left: 10%; right: 10%; bottom: 132px; text-align: center; white-space: pre-line; }
  #waveform { width: 220px; height: 44px; border: 1px solid #333; background: #151515; }
</style>
</head>
<body>
  <p><a href="./">Back to demos</a></p>
  <h1>Media Engine</h1>
  <p>Royalty-free sample assets from <code>./assets</code> — images, video, and audio spanning different resolutions, aspect ratios, and portrait/landscape framings, all driven by the same engine.</p>
  <div id="launcher" class="grid"></div>

  <div id="viewer" aria-label="Media viewer" role="dialog" aria-modal="true">
    <div class="bar top">
      <button id="prev" type="button">Prev</button>
      <button id="next" type="button">Next</button>
      <strong id="title"></strong>
      <span id="counter" class="muted"></span>
      <span id="caption" class="muted"></span>
      <span class="spacer"></span>
      <button id="fullscreen" type="button">Fullscreen</button>
      <button id="close" type="button">Close</button>
    </div>

    <div id="stage"></div>
    <div id="status"></div>
    <div id="captions"></div>

    <div class="bar bottom">
      <span id="image-tools" class="hidden">
        <button data-img="zoomOut" type="button">Zoom -</button>
        <button data-img="zoomIn" type="button">Zoom +</button>
        <button data-img="resetZoom" type="button">Fit</button>
        <button data-img="rotateLeft" type="button">Rotate L</button>
        <button data-img="rotateRight" type="button">Rotate R</button>
        <button data-img="reset" type="button">Reset</button>
      </span>

      <span id="playback-tools" class="hidden">
        <button id="play" type="button">Play</button>
        <span id="time" class="muted">0:00 / 0:00</span>
        <input id="seek" type="range" min="0" max="1000" value="0" aria-label="Seek">
        <button id="mute" type="button">Mute</button>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="1" aria-label="Volume">
        <label class="muted">Speed <input id="speed" type="range" min="0.25" max="4" step="0.01" value="1" aria-label="Speed"></label>
        <span id="speedVal" class="muted">1.00x</span>
        <button id="repeat" type="button">Repeat</button>
        <button id="pip" class="hidden" type="button">PiP</button>
        <button id="cast" class="hidden" type="button">Cast</button>
        <button id="captions-toggle" class="hidden" type="button">Captions</button>
        <canvas id="waveform" class="hidden" width="220" height="44"></canvas>
        <span id="audio-tools" class="hidden">
          <label class="muted">Pitch <input id="pitch" type="range" min="-12" max="12" step="0.01" value="0" aria-label="Pitch in semitones"></label>
          <span id="pitchVal" class="muted">0</span>
          <button id="ab" type="button">A-B</button>
        </span>
      </span>
    </div>
  </div>

  <script>
(() => {
  // ../core/emitter.js
  var Emitter = class {
    constructor() {
      this._map = /* @__PURE__ */ new Map();
    }
    /**
     * Subscribe to a named event.
     * @param {string} type
     * @param {(payload: any) => void} fn
     * @returns {() => void} unsubscribe
     */
    on(type, fn) {
      let set = this._map.get(type);
      if (!set) this._map.set(type, set = /* @__PURE__ */ new Set());
      set.add(fn);
      return () => this.off(type, fn);
    }
    /**
     * Subscribe for a single dispatch, then auto-unsubscribe.
     * @param {string} type
     * @param {(payload: any) => void} fn
     * @returns {() => void} unsubscribe (in case you want to cancel before it fires)
     */
    once(type, fn) {
      const off = this.on(type, (payload) => {
        off();
        fn(payload);
      });
      return off;
    }
    /** Remove a previously-added handler. Safe if it was never added. */
    off(type, fn) {
      const set = this._map.get(type);
      if (set) {
        set.delete(fn);
        if (set.size === 0) this._map.delete(type);
      }
    }
    /**
     * Dispatch `payload` to every handler of `type`.
     * @param {string} type
     * @param {any} [payload]
     */
    emit(type, payload) {
      const set = this._map.get(type);
      if (!set || set.size === 0) return;
      for (const fn of [...set]) fn(payload);
    }
    /** True if anyone is listening for `type` (lets callers skip building a payload). */
    has(type) {
      const set = this._map.get(type);
      return !!set && set.size > 0;
    }
    /** Drop all handlers (call from destroy()). */
    clear() {
      this._map.clear();
    }
  };

  // ../core/clamp.js
  function clamp(v, lo, hi) {
    return v < lo ? lo : v > hi ? hi : v;
  }

  // ../core/enums.js
  var Axis = Object.freeze({
    NONE: "none",
    HORIZONTAL: "horizontal",
    VERTICAL: "vertical"
  });
  var FitMode = Object.freeze({
    FIT: "fit",
    FIT_NO_UPSCALE: "fit-no-upscale",
    FILL: "fill"
  });

  // ../core/transform2d.js
  var EPS = 1e-6;
  var TRIG = {
    0: { cos: 1, sin: 0 },
    90: { cos: 0, sin: 1 },
    180: { cos: -1, sin: 0 },
    270: { cos: 0, sin: -1 }
  };
  function createTransform(opts = {}) {
    return build(opts);
  }
  function build(opts) {
    const initialFitMode = opts.fitMode || FitMode.FIT;
    const maxZoomFactor = opts.maxZoomFactor > 0 ? opts.maxZoomFactor : 4;
    const explicitMax = opts.maxScale;
    const doubleTapScale = opts.doubleTapScale != null ? opts.doubleTapScale : 1;
    let natW = 0;
    let natH = 0;
    let vpW = 0;
    let vpH = 0;
    let scale = 1;
    let panX = 0;
    let panY = 0;
    let rotation = 0;
    let flipH = false;
    let flipV = false;
    let fitMode = initialFitMode;
    const hasDims = () => natW > 0 && natH > 0 && vpW > 0 && vpH > 0;
    function effNat() {
      return rotation === 90 || rotation === 270 ? { w: natH, h: natW } : { w: natW, h: natH };
    }
    function fitScaleFor(mode) {
      if (!hasDims()) return 1;
      const { w, h } = effNat();
      const contain = Math.min(vpW / w, vpH / h);
      const cover = Math.max(vpW / w, vpH / h);
      if (mode === FitMode.FILL) return cover;
      if (mode === FitMode.FIT_NO_UPSCALE) return Math.min(contain, 1);
      return contain;
    }
    const fitScale = () => fitScaleFor(fitMode);
    const minScale = () => fitScale();
    function maxScale() {
      const floor = minScale();
      const m = explicitMax != null ? explicitMax : Math.max(1, fitScale()) * maxZoomFactor;
      return Math.max(m, floor);
    }
    function panBounds() {
      const { w, h } = effNat();
      const ew = w * scale;
      const eh = h * scale;
      return {
        x: Math.max(0, (ew - vpW) / 2),
        y: Math.max(0, (eh - vpH) / 2)
      };
    }
    function clampPan() {
      const b = panBounds();
      panX = clamp(panX, -b.x, b.x);
      panY = clamp(panY, -b.y, b.y);
    }
    function clampScale() {
      scale = clamp(scale, minScale(), maxScale());
    }
    function isFitted() {
      return Math.abs(scale - fitScale()) <= fitScale() * 1e-4 + EPS;
    }
    function reflow(mutate) {
      const refit = isFitted();
      mutate();
      if (refit) {
        scale = fitScale();
        panX = 0;
        panY = 0;
      } else {
        clampScale();
        clampPan();
      }
    }
    function applyFit() {
      scale = fitScale();
      panX = 0;
      panY = 0;
    }
    function matrix() {
      const { cos, sin } = TRIG[rotation];
      const sx = scale * (flipH ? -1 : 1);
      const sy = scale * (flipV ? -1 : 1);
      const a = sx * cos;
      const b = sx * sin;
      const c = -sy * sin;
      const d = sy * cos;
      const cx = natW / 2;
      const cy = natH / 2;
      const e = vpW / 2 + panX - (a * cx + c * cy);
      const f = vpH / 2 + panY - (b * cx + d * cy);
      return [a, b, c, d, e, f].map((v) => v === 0 ? 0 : v);
    }
    return {
      // ---- inputs --------------------------------------------------------------
      /** Set intrinsic image dimensions (e.g. from img.naturalWidth on load). */
      setNatural(w, h) {
        reflow(() => {
          natW = w > 0 ? w : 0;
          natH = h > 0 ? h : 0;
        });
        return this;
      },
      /** Set the viewport (container) dimensions. */
      setViewport(w, h) {
        reflow(() => {
          vpW = w > 0 ? w : 0;
          vpH = h > 0 ? h : 0;
        });
        return this;
      },
      /** Change fit mode and snap to that mode's fit (the point of changing it). */
      setFitMode(mode) {
        fitMode = mode;
        applyFit();
        return this;
      },
      // ---- zoom ----------------------------------------------------------------
      /**
       * Zoom to an absolute scale, keeping the viewport point (ox, oy) fixed under
       * the cursor / pinch midpoint. Omitting the point zooms about the center.
       * Scale is clamped to [min, max]; pan is re-clamped to bounds afterward.
       *
       * Math: with u = point relative to viewport center and k = newScale/oldScale,
       *   newPan = k·oldPan − (k−1)·u
       * keeps the content under the point stationary (see header for the model).
       */
      zoomTo(targetScale, ox, oy) {
        const s0 = scale;
        const s1 = clamp(targetScale, minScale(), maxScale());
        const k = s0 > 0 ? s1 / s0 : 1;
        const px = ox == null ? vpW / 2 : ox;
        const py = oy == null ? vpH / 2 : oy;
        const ux = px - vpW / 2;
        const uy = py - vpH / 2;
        panX = k * panX - (k - 1) * ux;
        panY = k * panY - (k - 1) * uy;
        scale = s1;
        clampPan();
        return this;
      },
      /** Multiply current scale by `factor`, anchored at (ox, oy). */
      zoomBy(factor, ox, oy) {
        return this.zoomTo(scale * factor, ox, oy);
      },
      /**
       * The scale a double-tap / double-click at a point should jump to: from fit,
       * zoom in to the configured level (default 100% native); otherwise zoom back
       * to fit. Guards the degenerate case where the configured level is not
       * actually more zoomed than fit (a small image whose fit already upscales
       * past 100%) by falling back to a meaningful zoom-in.
       */
      doubleTapTarget() {
        const fit = fitScale();
        if (!isFitted()) return fit;
        let target = doubleTapScale;
        if (!(target > fit + EPS)) target = Math.min(maxScale(), Math.max(fit * 2, fit + 1));
        return clamp(target, minScale(), maxScale());
      },
      // ---- pan -----------------------------------------------------------------
      /** Translate by (dx, dy) px, clamped to bounds. */
      panBy(dx, dy) {
        panX += dx;
        panY += dy;
        clampPan();
        return this;
      },
      /** Set the pan offset, clamped to bounds. */
      panTo(x, y) {
        panX = x;
        panY = y;
        clampPan();
        return this;
      },
      // ---- rotate / flip -------------------------------------------------------
      /** Rotate by a multiple of 90° (±90 typical). Re-fits or re-clamps. */
      rotateBy(deg) {
        reflow(() => {
          const step = Math.round(deg / 90) * 90;
          rotation = ((rotation + step) % 360 + 360) % 360;
        });
        return this;
      },
      rotateLeft() {
        return this.rotateBy(-90);
      },
      rotateRight() {
        return this.rotateBy(90);
      },
      flipHorizontal() {
        flipH = !flipH;
        clampPan();
        return this;
      },
      flipVertical() {
        flipV = !flipV;
        clampPan();
        return this;
      },
      // ---- resets --------------------------------------------------------------
      /** Reset everything: rotation 0, no flips, initial fit mode, fitted, centered. */
      reset() {
        rotation = 0;
        flipH = false;
        flipV = false;
        fitMode = initialFitMode;
        applyFit();
        return this;
      },
      resetZoom() {
        applyFit();
        return this;
      },
      resetPan() {
        panX = 0;
        panY = 0;
        clampPan();
        return this;
      },
      resetRotation() {
        reflow(() => {
          rotation = 0;
        });
        return this;
      },
      resetFlip() {
        flipH = false;
        flipV = false;
        clampPan();
        return this;
      },
      // ---- queries -------------------------------------------------------------
      /** True when zoomed beyond the fit level — the gesture module's pan/swipe switch. */
      isZoomed() {
        return scale > fitScale() * (1 + 1e-4);
      },
      /** Current pan bounds {x, y} (the max |pan| on each axis). */
      getBounds() {
        return panBounds();
      },
      getFitScale() {
        return fitScale();
      },
      getMinScale() {
        return minScale();
      },
      getMaxScale() {
        return maxScale();
      },
      /** Full emitted state, including the ready-to-apply matrix. */
      getState() {
        return {
          scale,
          x: panX,
          y: panY,
          rotation,
          flipH,
          flipV,
          fitMode,
          matrix: matrix(),
          fitScale: fitScale(),
          minScale: minScale(),
          maxScale: maxScale(),
          ready: hasDims(),
          bounds: panBounds()
        };
      },
      /** The `zoom` facet of the renderer's capability descriptor. */
      getZoomCapability() {
        return {
          supported: true,
          min: minScale(),
          max: maxScale(),
          current: scale,
          fitAvailable: Math.abs(scale - fitScale()) > EPS,
          ready: hasDims()
        };
      }
    };
  }

  // ../core/gestures.js
  var DEG = 180 / Math.PI;
  function classifyDrag(dx, dy, deadzoneDeg = 30) {
    const angle = Math.atan2(Math.abs(dy), Math.abs(dx)) * DEG;
    if (angle <= deadzoneDeg) return Axis.HORIZONTAL;
    if (angle >= 90 - deadzoneDeg && dy > 0) return Axis.VERTICAL;
    if (Math.abs(dx) >= Math.abs(dy)) return Axis.HORIZONTAL;
    return dy > 0 ? Axis.VERTICAL : Axis.HORIZONTAL;
  }
  var DEFAULTS = {
    moveThreshold: 10,
    // px before a press is reclassified as a drag (rules 2/3)
    doubleTapMs: 300,
    // double-tap time window (rule 4)
    doubleTapDist: 30,
    // double-tap distance window, px (rule 4)
    axisDeadzoneDeg: 30,
    // rule 2
    navDistance: 80,
    // px of horizontal travel that commits a navigate
    dismissDistance: 140,
    // px of downward travel that commits a dismiss
    flickVelocity: 0.5,
    // px/ms; a fast flick commits regardless of distance
    wheelZoomBase: 1.0015,
    // factor = base^(−deltaY); tuned for typical wheel deltas
    wheelZoomClamp: [0.8, 1.25]
    // per-event factor clamp so one notch can't leap
  };
  function createGestureRecognizer(opts = {}) {
    const cfg = { ...DEFAULTS, ...opts };
    const isZoomed = typeof opts.isZoomed === "function" ? opts.isZoomed : () => false;
    const emitter = new Emitter();
    const pointers = /* @__PURE__ */ new Map();
    let mode = "idle";
    let escalated = false;
    let axis = Axis.NONE;
    let primaryId = null;
    let lastX = 0;
    let lastY = 0;
    let lastT = 0;
    let vx = 0;
    let vy = 0;
    let prevDist = 0;
    let prevMidX = 0;
    let prevMidY = 0;
    let lastTapT = -Infinity;
    let lastTapX = 0;
    let lastTapY = 0;
    const emit = (type, payload) => emitter.emit(type, payload);
    function twoIds() {
      const it = pointers.keys();
      return [it.next().value, it.next().value];
    }
    function midAndDist() {
      const [a, b] = twoIds();
      const p = pointers.get(a);
      const q = pointers.get(b);
      return {
        cx: (p.x + q.x) / 2,
        cy: (p.y + q.y) / 2,
        dist: Math.hypot(p.x - q.x, p.y - q.y) || 1
      };
    }
    function endSingleDrag({ cancelled }) {
      if (mode === "pan") emit("panend", { cancelled });
      else if (mode === "nav") emit("navend", { total: lastX - startXOf(primaryId), vx, direction: dirOf(lastX - startXOf(primaryId)), willNavigate: false, cancelled });
      else if (mode === "dismiss") emit("dismissend", { total: lastY - startYOf(primaryId), vy, willDismiss: false, cancelled });
    }
    const startXOf = (id) => pointers.get(id) ? pointers.get(id).sx : lastX;
    const startYOf = (id) => pointers.get(id) ? pointers.get(id).sy : lastY;
    const dirOf = (total) => total < 0 ? "next" : "prev";
    function beginPinch() {
      mode = "pinch";
      escalated = true;
      axis = Axis.NONE;
      const m = midAndDist();
      prevDist = m.dist;
      prevMidX = m.cx;
      prevMidY = m.cy;
      emit("pinchstart", { cx: m.cx, cy: m.cy });
    }
    return {
      /** Subscribe to resolved gestures. Returns an unsubscribe fn. */
      on: (type, fn) => emitter.on(type, fn),
      /** @param {{id:number,x:number,y:number,t:number}} s */
      pointerDown(s) {
        pointers.set(s.id, { x: s.x, y: s.y, sx: s.x, sy: s.y, st: s.t });
        if (pointers.size === 1) {
          primaryId = s.id;
          mode = "pending";
          escalated = false;
          axis = Axis.NONE;
          lastX = s.x;
          lastY = s.y;
          lastT = s.t;
          vx = vy = 0;
        } else if (pointers.size === 2) {
          if (escalated) endSingleDrag({ cancelled: true });
          beginPinch();
        }
      },
      /** @param {{id:number,x:number,y:number,t:number}} s */
      pointerMove(s) {
        const p = pointers.get(s.id);
        if (!p) return;
        p.x = s.x;
        p.y = s.y;
        if (mode === "pinch") {
          const m = midAndDist();
          const scaleDelta = m.dist / (prevDist || 1);
          const dx = m.cx - prevMidX;
          const dy = m.cy - prevMidY;
          prevDist = m.dist;
          prevMidX = m.cx;
          prevMidY = m.cy;
          emit("pinch", { scaleDelta, dx, dy, cx: m.cx, cy: m.cy });
          return;
        }
        if (s.id !== primaryId) return;
        const dt = s.t - lastT;
        if (dt > 0) {
          vx = (s.x - lastX) / dt;
          vy = (s.y - lastY) / dt;
        }
        const dxStep = s.x - lastX;
        const dyStep = s.y - lastY;
        lastX = s.x;
        lastY = s.y;
        lastT = s.t;
        const totalX = s.x - p.sx;
        const totalY = s.y - p.sy;
        if (mode === "pending") {
          if (Math.hypot(totalX, totalY) < cfg.moveThreshold) return;
          if (isZoomed()) {
            mode = "pan";
            escalated = true;
            emit("panstart", { x: s.x, y: s.y });
            emit("pan", { dx: totalX, dy: totalY, x: s.x, y: s.y });
          } else {
            axis = classifyDrag(totalX, totalY, cfg.axisDeadzoneDeg);
            escalated = true;
            if (axis === Axis.HORIZONTAL) {
              mode = "nav";
              emit("navstart", { x: s.x, y: s.y });
              emit("navmove", { dx: dxStep, total: totalX, x: s.x, y: s.y });
            } else {
              mode = "dismiss";
              emit("dismissstart", { x: s.x, y: s.y });
              emit("dismissmove", {
                dy: dyStep,
                total: totalY,
                progress: Math.max(0, Math.min(1, totalY / cfg.dismissDistance)),
                x: s.x,
                y: s.y
              });
            }
          }
          return;
        }
        if (mode === "pan") {
          emit("pan", { dx: dxStep, dy: dyStep, x: s.x, y: s.y });
        } else if (mode === "nav") {
          emit("navmove", { dx: dxStep, total: totalX, x: s.x, y: s.y });
        } else if (mode === "dismiss") {
          emit("dismissmove", {
            dy: dyStep,
            total: totalY,
            progress: Math.max(0, Math.min(1, totalY / cfg.dismissDistance)),
            x: s.x,
            y: s.y
          });
        }
      },
      /** @param {{id:number,x:number,y:number,t:number}} s */
      pointerUp(s) {
        const p = pointers.get(s.id);
        if (!p) return;
        if (mode === "pinch") {
          pointers.delete(s.id);
          if (pointers.size >= 1) {
            emit("pinchend", {});
            const [remId] = pointers.keys();
            primaryId = remId;
            const r = pointers.get(remId);
            lastX = r.x;
            lastY = r.y;
            lastT = s.t;
            vx = vy = 0;
            mode = "pan";
            escalated = true;
            emit("panstart", { x: r.x, y: r.y });
          } else {
            emit("pinchend", {});
            mode = "idle";
          }
          return;
        }
        pointers.delete(s.id);
        if (s.id !== primaryId) return;
        if (!escalated && mode === "pending") {
